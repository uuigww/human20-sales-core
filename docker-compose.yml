# Поднимает API + Postgres(pgvector) одной командой:  docker compose up -d
# Перед запуском заполни .env (как минимум OPENAI_API_KEY и API_KEY).
# Схема db/schema.sql применяется автоматически при первой инициализации БД.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: human20
      POSTGRES_PASSWORD: human20
      POSTGRES_DB: human20
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U human20"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    env_file: .env
    environment:
      # Внутренний адрес БД переопределяет DATABASE_URL из .env
      DATABASE_URL: postgres://human20:human20@db:5432/human20
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
